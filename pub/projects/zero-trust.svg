<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Zero trust architecture diagram -->
  <g fill="none" stroke="#00D4FF" stroke-opacity="0.12" stroke-width="1">
    <!-- Outer trust boundary -->
    <rect x="100" y="100" width="600" height="250" rx="12"/>
    <text x="400" y="375" text-anchor="middle" fill="#00D4FF" font-family="monospace" font-size="9" opacity="0.2">ZERO TRUST BOUNDARY</text>
  </g>
  <!-- Internal network nodes -->
  <g>
    <circle cx="250" cy="180" r="25" fill="none" stroke="#00D4FF" stroke-opacity="0.25" stroke-width="1.5"/>
    <text x="250" y="185" text-anchor="middle" fill="#00D4FF" font-family="monospace" font-size="8" opacity="0.4">POLICY</text>
    <circle cx="400" cy="180" r="25" fill="none" stroke="#00D4FF" stroke-opacity="0.2" stroke-width="1.5"/>
    <text x="400" y="185" text-anchor="middle" fill="#00D4FF" font-family="monospace" font-size="8" opacity="0.3">AUTH</text>
    <circle cx="550" cy="180" r="25" fill="none" stroke="#00D4FF" stroke-opacity="0.2" stroke-width="1.5"/>
    <text x="550" y="185" text-anchor="middle" fill="#00D4FF" font-family="monospace" font-size="8" opacity="0.3">MONITOR</text>
  </g>
  <!-- Connection lines -->
  <g stroke="#00D4FF" stroke-opacity="0.08" stroke-width="0.8">
    <line x1="275" y1="180" x2="375" y2="180"/>
    <line x1="425" y1="180" x2="525" y2="180"/>
    <line x1="250" y1="205" x2="250" y2="280"/>
    <line x1="400" y1="205" x2="400" y2="280"/>
    <line x1="550" y1="205" x2="550" y2="280"/>
  </g>
  <!-- Shield icon -->
  <g transform="translate(400,265)" fill="none" stroke="#00D4FF" stroke-opacity="0.15" stroke-width="1.5">
    <path d="M0,-20 Q15,-20 25,-10 Q25,10 0,20 Q-25,10 -25,-10 Q-15,-20 0,-20Z"/>
    <line x1="0" y1="-12" x2="0" y2="8"/>
    <line x1="-6" y1="-4" x2="6" y2="-4"/>
  </g>
  <!-- Accent bar -->
  <rect x="0" y="380" width="800" height="4" fill="url(#accent)"/>
  <!-- Title -->
  <text x="400" y="70" text-anchor="middle" fill="#00D4FF" font-family="monospace" font-size="18" font-weight="bold" opacity="0.9">Zero-Trust Architecture Framework</text>
  <text x="400" y="95" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="11">Microsegmentation / Continuous Verification</text>
</svg>