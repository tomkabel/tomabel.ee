<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Opcode/bytecode visualization -->
  <g opacity="0.08" font-family="monospace" font-size="8" fill="#00D4FF">
    <text x="100" y="140">0x00:  PUSH   R1, #0x3F</text>
    <text x="100" y="155">0x03:  LOAD   R2, [R1+0x10]</text>
    <text x="100" y="170">0x07:  XOR    R3, R2, R1</text>
    <text x="100" y="185">0x0A:  JMP    #0x1F</text>
    <text x="100" y="200">0x0D:  CALL   #0x3A, R4</text>
    <text x="400" y="140">0x10:  CMP    R4, #0x00</text>
    <text x="400" y="155">0x13:  JNE    #0x0A</text>
    <text x="400" y="170">0x16:  MOV    R5, [R3]</text>
    <text x="400" y="185">0x19:  ADD    R5, R5, R2</text>
    <text x="400" y="200">0x1C:  RET    R5</text>
  </g>
  <!-- Control flow graph -->
  <g fill="none" stroke="#00D4FF" stroke-opacity="0.1" stroke-width="0.8">
    <circle cx="200" cy="260" r="20"/>
    <circle cx="330" cy="310" r="20"/>
    <circle cx="470" cy="260" r="20"/>
    <circle cx="600" cy="310" r="20"/>
    <line x1="215" y1="250" x2="315" y2="295"/>
    <line x1="220" y1="270" x2="315" y2="300"/>
    <line x1="350" y1="310" x2="450" y2="275"/>
    <line x1="490" y1="260" x2="585" y2="295"/>
  </g>
  <g fill="#00D4FF" fill-opacity="0.07" font-family="monospace" font-size="6">
    <text x="200" y="264" text-anchor="middle">ENTRY</text>
    <text x="330" y="314" text-anchor="middle">VM_INIT</text>
    <text x="470" y="264" text-anchor="middle">DISPATCH</text>
    <text x="600" y="314" text-anchor="middle">EXECUTE</text>
  </g>
  <!-- Accent bar -->
  <rect x="0" y="380" width="800" height="4" fill="url(#accent)"/>
  <!-- Title -->
  <text x="400" y="80" text-anchor="middle" fill="#00D4FF" font-family="monospace" font-size="16" font-weight="bold" opacity="0.9">BotGuard VM Security Research</text>
  <text x="400" y="105" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="11">Obfuscated JavaScript VM Analysis</text>
  <!-- Paper/doi decoration -->
  <text x="400" y="355" text-anchor="middle" fill="#00D4FF" fill-opacity="0.1" font-family="monospace" font-size="8">arXiv:2025.11 — Opcode Architecture Mapping</text>
</svg>