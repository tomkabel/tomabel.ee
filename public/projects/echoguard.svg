<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Neural network nodes -->
  <g fill="#00D4FF" fill-opacity="0.15">
    <circle cx="120" cy="160" r="4"/>
    <circle cx="200" cy="140" r="3"/>
    <circle cx="280" cy="180" r="4"/>
    <circle cx="360" cy="130" r="3"/>
    <circle cx="440" cy="170" r="4"/>
    <circle cx="520" cy="140" r="3"/>
    <circle cx="600" cy="180" r="4"/>
    <circle cx="680" cy="150" r="3"/>
  </g>
  <g stroke="#00D4FF" stroke-opacity="0.08" stroke-width="0.5">
    <line x1="120" y1="160" x2="200" y2="140"/>
    <line x1="200" y1="140" x2="280" y2="180"/>
    <line x1="280" y1="180" x2="360" y2="130"/>
    <line x1="360" y1="130" x2="440" y2="170"/>
    <line x1="440" y1="170" x2="520" y2="140"/>
    <line x1="520" y1="140" x2="600" y2="180"/>
    <line x1="600" y1="180" x2="680" y2="150"/>
  </g>
  <g stroke="#00D4FF" stroke-opacity="0.06" stroke-width="0.5">
    <line x1="120" y1="160" x2="280" y2="180"/>
    <line x1="200" y1="140" x2="360" y2="130"/>
    <line x1="280" y1="180" x2="440" y2="170"/>
    <line x1="360" y1="130" x2="520" y2="140"/>
    <line x1="440" y1="170" x2="600" y2="180"/>
  </g>
  <!-- Wave forms -->
  <path d="M150 300 Q200 270 250 300 Q300 330 350 300 Q400 270 450 300 Q500 330 550 300 Q600 270 650 300" fill="none" stroke="#00D4FF" stroke-opacity="0.15" stroke-width="2"/>
  <path d="M150 320 Q200 300 250 320 Q300 340 350 320 Q400 300 450 320 Q500 340 550 320 Q600 300 650 320" fill="none" stroke="#00D4FF" stroke-opacity="0.08" stroke-width="1"/>
  <!-- Accent bar -->
  <rect x="0" y="380" width="800" height="4" fill="url(#accent)"/>
  <!-- Title -->
  <text x="400" y="240" text-anchor="middle" fill="#00D4FF" font-family="monospace" font-size="18" font-weight="bold" opacity="0.9">EchoGuard</text>
  <text x="400" y="265" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="11">AI Voice Cloning / Red-Teaming Pipeline</text>
  <!-- GPU/neural decoration -->
  <text x="400" y="100" text-anchor="middle" fill="#00D4FF" fill-opacity="0.08" font-family="monospace" font-size="8">tensor([[[0.832, 0.124, 0.567, ..., 0.991]]])</text>
</svg>