<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="#00D4FF" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="50" y1="0" x2="50" y2="450"/>
    <line x1="100" y1="0" x2="100" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>
  <!-- Hex pattern -->
  <g fill="none" stroke="#00D4FF" stroke-opacity="0.12" stroke-width="1">
    <polygon points="400,100 440,120 440,160 400,180 360,160 360,120"/>
    <polygon points="480,140 520,160 520,200 480,220 440,200 440,160"/>
    <polygon points="320,180 360,200 360,240 320,260 280,240 280,200"/>
  </g>
  <!-- Circuit lines -->
  <path d="M100 225 L200 225 L200 200 L300 200" fill="none" stroke="#00D4FF" stroke-opacity="0.2" stroke-width="1.5"/>
  <circle cx="100" cy="225" r="3" fill="#00D4FF" fill-opacity="0.3"/>
  <circle cx="300" cy="200" r="3" fill="#00D4FF" fill-opacity="0.3"/>
  <path d="M500 250 L600 250 L600 275 L700 275" fill="none" stroke="#00D4FF" stroke-opacity="0.15" stroke-width="1"/>
  <!-- Matrix code rain effect -->
  <g fill="#00D4FF" fill-opacity="0.08" font-family="monospace" font-size="10">
    <text x="60" y="350">0x7F 0xE8 0x93 0x4A</text>
    <text x="550" y="380">0xB1 0x2C 0xFD 0xA0</text>
  </g>
  <!-- Accent bar -->
  <rect x="0" y="380" width="800" height="4" fill="url(#accent)"/>
  <!-- Project title -->
  <text x="400" y="240" text-anchor="middle" fill="#00D4FF" font-family="monospace" font-size="18" font-weight="bold" opacity="0.9">BotGuard VM Research</text>
  <text x="400" y="265" text-anchor="middle" fill="#64748B" font-family="monospace" font-size="11">Reverse Engineering / VM Decompilation</text>
  <!-- Binary decoration -->
  <text x="400" y="310" text-anchor="middle" fill="#00D4FF" fill-opacity="0.15" font-family="monospace" font-size="9">01001010 01010011 00100000 01010110 01001101</text>
</svg>